name: Deploy to VPS

# Kapan robot ini harus bekerja? 
# Jawab: Setiap kali ada push ke branch 'main'
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Tarik Kode dari GitHub ke Robot (Runner)
        uses: actions/checkout@v4

      - name: 2. Copy File Project ke VPS (via SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "~/ai-automation"

      - name: 3. Masuk ke VPS & Eksekusi Docker (via SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/ai-automation
            echo "Membangun ulang layanan API Gateway & AI Worker..."
            docker compose up -d --build
            echo "Deployment Selesai!"